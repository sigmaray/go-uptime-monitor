name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o uptime-monitor .

  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build app image
        run: docker compose -f docker-compose.with-infra.yml build app

      - name: Start database
        run: docker compose -f docker-compose.with-infra.yml up -d postgres --wait

      - name: Run migrations
        run: docker compose -f docker-compose.with-infra.yml run --rm app ./uptime-monitor migrate

      - name: Start app
        run: docker compose -f docker-compose.with-infra.yml up -d app --wait

      - name: Check health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18080/health; then
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed"
          docker compose -f docker-compose.with-infra.yml logs
          exit 1

      - name: Stop test environment
        if: always()
        run: docker compose -f docker-compose.with-infra.yml down -v

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          GO_UPTIME_MONITOR_TEST_DATABASE_NAME: go-uptime-monitor-test
        run: npm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
