{{ define "admin/layout.html" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} - {{ end }}Go Uptime Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body{{ if .BodyClass }} class="{{ .BodyClass }}"{{ end }}>
{{ if not .HideNav }}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1 fs-5">Admin Panel</span>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">View Site</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/users">Users</a></li>
            </ul>
            <form action="/admin/logout" method="POST" class="d-flex">
                <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
{{ end }}
<div class="container">
{{ if .Error }}
<div class="alert alert-danger">{{ .Error }}</div>
{{ end }}
{{ .Content }}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{{ end }}
