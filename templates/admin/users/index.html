{{ define "admin/users/index.html" }}
<h2>Users</h2>

<div class="mb-4">
    <a href="/admin/users/new" class="btn btn-primary">Create New User</a>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Created At</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {{ range .Users }}
        <tr>
            <td>{{ .ID }}</td>
            <td>{{ .Username }}</td>
            <td>{{ .CreatedAt.Format "2006-01-02 15:04" }}</td>
            <td>
                <a href="/admin/users/{{ .ID }}/edit" class="btn btn-sm btn-outline-primary">Edit</a>
                <form action="/admin/users/{{ .ID }}/delete" method="POST" class="d-inline" onsubmit="return confirm('Delete this user?');">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        {{ else }}
        <tr>
            <td colspan="4" class="text-center text-muted">No users found.</td>
        </tr>
        {{ end }}
    </tbody>
</table>
{{ end }}
